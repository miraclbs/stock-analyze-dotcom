<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Background circle -->
    <circle cx="16" cy="16" r="15" fill="url(#grad1)" stroke="#1E3A8A" stroke-width="1" />

    <!-- Chart lines -->
    <polyline points="6,22 10,18 14,20 18,14 22,16 26,10" fill="none" stroke="white" stroke-width="2"
        stroke-linecap="round" />

    <!-- Chart points -->
    <circle cx="6" cy="22" r="1.5" fill="white" />
    <circle cx="10" cy="18" r="1.5" fill="white" />
    <circle cx="14" cy="20" r="1.5" fill="white" />
    <circle cx="18" cy="14" r="1.5" fill="white" />
    <circle cx="22" cy="16" r="1.5" fill="white" />
    <circle cx="26" cy="10" r="1.5" fill="white" />

    <!-- Dollar sign -->
    <text x="16" y="28" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle"
        fill="white">$</text>
</svg>